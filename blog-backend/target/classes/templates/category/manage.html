<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('分类管理')}"></head>
<body>

<header th:replace="~{fragments/common :: header(${loginUser})}"></header>

<main class="page-content" aria-label="Content">
  <div class="wrapper">
    <h1 style="margin-top:32px;color:#2d2d2d;">📁 分类管理</h1>

    <!-- 错误提示 -->
    <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>

    <!-- 新增分类表单 -->
    <div class="form-page" style="max-width:480px;margin:20px 0;">
      <form action="/category/add" method="post" style="display:flex;gap:10px;">
        <input type="text" name="name" placeholder="输入新分类名称" required
               style="flex:1;padding:9px 14px;border:1px solid #fde8f2;border-radius:10px;font-family:inherit;font-size:0.95rem;outline:none;">
        <button type="submit" class="btn btn-primary" style="white-space:nowrap;">+ 新增分类</button>
      </form>
    </div>

    <!-- 分类列表 -->
    <table class="category-table" th:if="${categories != null and !categories.isEmpty()}">
      <thead>
        <tr>
          <th>ID</th>
          <th>分类名称</th>
          <th>创建时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="cat : ${categories}">
          <td th:text="${cat.id}">1</td>
          <td th:text="${cat.name}">分类名</td>
          <td th:text="${#temporals.format(cat.createTime,'yyyy-MM-dd')}">2024-01-01</td>
          <td>
            <!-- 编辑分类（内联表单） -->
            <form th:action="@{'/category/' + ${cat.id} + '/edit'}" method="post"
                  style="display:inline;"
                  th:id="'edit-form-' + ${cat.id}">
              <input type="text" name="name" th:value="${cat.name}"
                     th:id="'edit-input-' + ${cat.id}"
                     style="display:none;width:120px;padding:4px 8px;border:1px solid #fde8f2;border-radius:6px;font-size:0.85rem;">
              <button type="button" class="btn btn-secondary"
                      th:onclick="'toggleEdit(' + ${cat.id} + ')'">编辑</button>
              <button type="submit" class="btn btn-primary"
                      th:id="'save-btn-' + ${cat.id}"
                      style="display:none;">保存</button>
            </form>
            <!-- 删除分类 -->
            <form th:action="@{'/category/' + ${cat.id} + '/delete'}" method="post"
                  style="display:inline;"
                  onsubmit="return confirm('确认删除该分类吗？（该分类下有文章时无法删除）')">
              <button type="submit" class="btn btn-danger">删除</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <p style="color:#bbb;text-align:center;padding:24px 0;"
       th:if="${categories == null or categories.isEmpty()}">暂无分类，快去新增一个吧！</p>

    <p style="margin-top:24px;">
      <a th:href="@{/}" style="color:#aaa;font-size:0.9rem;">← 返回首页</a>
    </p>
  </div>
</main>

<footer th:replace="~{fragments/common :: footer}"></footer>
<script th:replace="~{fragments/common :: hamburgerScript}"></script>
<script>
function toggleEdit(id) {
  var input = document.getElementById('edit-input-' + id);
  var saveBtn = document.getElementById('save-btn-' + id);
  if (input.style.display === 'none') {
    input.style.display = 'inline-block';
    saveBtn.style.display = 'inline-block';
  } else {
    input.style.display = 'none';
    saveBtn.style.display = 'none';
  }
}
</script>
</body>
</html>
