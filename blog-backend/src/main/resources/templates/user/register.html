<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('注册')}"></head>
<body>

<header th:replace="~{fragments/common :: header(null)}"></header>

<main class="page-content" aria-label="Content">
  <div class="wrapper">
    <div class="form-page">
      <h1>📝 注册</h1>

      <!-- 错误提示 -->
      <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>

      <form action="/register" method="post">
        <div class="form-group">
          <label for="username">用户名 <span style="color:#aaa;font-size:0.82rem;">（2-20 字符）</span></label>
          <input type="text" id="username" name="username"
                 th:value="${dto != null ? dto.username : ''}"
                 placeholder="请输入用户名" required autofocus
                 minlength="2" maxlength="20">
        </div>
        <div class="form-group">
          <label for="password">密码 <span style="color:#aaa;font-size:0.82rem;">（不少于 6 位）</span></label>
          <input type="password" id="password" name="password"
                 placeholder="请输入密码" required minlength="6">
        </div>
        <div class="form-group">
          <label for="email">邮箱 <span style="color:#aaa;font-size:0.82rem;">（可选）</span></label>
          <input type="email" id="email" name="email"
                 th:value="${dto != null ? dto.email : ''}"
                 placeholder="请输入邮箱（可选）">
        </div>
        <button type="submit" class="form-submit-btn">注 册</button>
      </form>

      <p class="form-link">已有账号？<a th:href="@{/login}">立即登录</a></p>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/common :: footer}"></footer>
<script th:replace="~{fragments/common :: hamburgerScript}"></script>
</body>
</html>
