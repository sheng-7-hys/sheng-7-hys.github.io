<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('登录')}"></head>
<body>

<header th:replace="~{fragments/common :: header(null)}"></header>

<main class="page-content" aria-label="Content">
  <div class="wrapper">
    <div class="form-page">
      <h1>🔑 登录</h1>

      <!-- 注册成功提示 -->
      <div class="success-msg" th:if="${param.registered != null}">
        注册成功！请使用新账号登录 🎉
      </div>

      <!-- 错误提示 -->
      <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>

      <form action="/login" method="post">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username"
                 th:value="${dto != null ? dto.username : ''}"
                 placeholder="请输入用户名" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password"
                 placeholder="请输入密码" required>
        </div>
        <button type="submit" class="form-submit-btn">登 录</button>
      </form>

      <p class="form-link">还没有账号？<a th:href="@{/register}">立即注册</a></p>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/common :: footer}"></footer>
<script th:replace="~{fragments/common :: hamburgerScript}"></script>
</body>
</html>
