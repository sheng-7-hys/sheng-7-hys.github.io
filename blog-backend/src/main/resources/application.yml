server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 30m  # Session 有效期 30 分钟

spring:
  application:
    name: blog

  # =====================
  # 数据源配置（MySQL 8.0）
  # =====================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456   # 请修改为实际 MySQL 密码

  # =====================
  # Thymeleaf 配置
  # =====================
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
    cache: false  # 开发时关闭缓存，生产环境改为 true

# =====================
# MyBatis-Plus 配置
# =====================
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发时打印 SQL（生产可移除）
  global-config:
    db-config:
      id-type: auto  # 主键自增

# =====================
# 日志配置
# =====================
logging:
  level:
    com.sheng.blog: debug
    root: info
